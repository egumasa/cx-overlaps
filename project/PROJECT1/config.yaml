# --- Extraction step (cx-extraction.py) ---

# Directory of raw .txt transcripts (relative to this project folder)
# Drop new transcripts here; extracted .cex files go to intermediate/
rawtext_directory: input

# Where to write trigram .cex files after extraction
trigram_directory: intermediate/trigram

# Where to write unigram .cex files after extraction
unigram_directory: intermediate/unigram

# --- Analysis step (SimilarityAnalysis.py) ---

# Which analysis to run: trigram or unigram
analysis_type: trigram

# Header lines to skip. Sample data (input/sample_data) has a 7-line header;
# files generated by cx-extraction.py use 6 '#' lines.
begin_line: 7

# Input .cex directory for analysis (overrides trigram_directory/unigram_directory above)
# Set to input/sample_data to run on the bundled sample data.
# Set to intermediate/trigram to run on freshly extracted files.
input_directory: input/sample_data

# Output CSV path (relative to this project folder)
output_name: output/result.csv

# Optional: directory for token-intersection files
output_directory: null

# Optional: source text for compare-to-source mode
source_text_path: null

compare_abc: false
use_semi_colon_delimiters: false
